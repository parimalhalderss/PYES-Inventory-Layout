plugins {
    id 'fabric-loom' version '1.10-SNAPSHOT'
}

version = '1.0.7'
group = 'com.codex.inventorylayout'

base {
    archivesName = 'PYES-Inventory-Layout'
}

repositories {
    maven {
        url = 'https://maven.fabricmc.net/'
    }
    mavenCentral()
}

dependencies {
    // Minecraft
    minecraft "com.mojang:minecraft:1.21.11"

    // Yarn mappings (recommended for Fabric mods)
    mappings "net.fabricmc:yarn:1.21.11+build.1:v2"

    // Loader
    modImplementation "net.fabricmc:fabric-loader:0.18.0"

    // Fabric API
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.141.4+1.21.11"
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
    options.release = 21
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.base.archivesName.get()}" }
    }
}
