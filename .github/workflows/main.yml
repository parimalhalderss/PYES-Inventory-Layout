name: Build Mod JAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Fix folder structure
        run: |
          mkdir -p src/main/java/com/codex/inventorylayout
          mkdir -p src/main/resources/assets/inventory-layout/lang
          mkdir -p gradle/wrapper
          mv InventoryLayoutClient.java src/main/jav
